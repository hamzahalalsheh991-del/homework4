version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: fitness_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: fitness_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/fitness_tracker
    depends_on:
      - mongodb

volumes:
  mongo_data: