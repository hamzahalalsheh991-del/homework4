version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: fitness_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: fitness_tracker
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - fitness_network

  api:
    build: .
    container_name: fitness_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      MONGODB_URL: mongodb://admin:admin123@mongodb:27017
      MONGODB_DB: fitness_tracker
    depends_on:
      - mongodb
    networks:
      - fitness_network

volumes:
  mongodb_data:

networks:
  fitness_network:
    driver: bridge